<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>血統くん — BLOODLINE PREDICTOR</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <style>
    html, body { margin: 0; padding: 0; background: #0a0a0a; }
    #root { min-height: 100vh; }
    /* 読み込み中のフォールバック */
    #boot { color: #c8a84b; font-family: sans-serif; text-align: center; padding: 80px 20px; }
  </style>

  <!-- React + Babel (CDN, ビルド不要) -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
</head>
<body>
  <div id="root"><div id="boot">血統くん 起動中…</div></div>

  <!-- データ・定数・エンジン（プレーンJS。Babel不要、先に実行） -->
  <script src="constants.js"></script>
  <script src="storage.js"></script>
  <script src="calcAptitude.js"></script>

  <!-- アプリ本体（JSX。Babelで変換） -->
  <script type="text/babel" src="App.jsx"></script>

  <!-- PWA: service worker 登録 -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
